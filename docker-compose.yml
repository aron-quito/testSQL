services:
  # Servicio de Base de Datos
  db:
    image: mariadb:latest
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: carton123
      MYSQL_DATABASE: testSQL
    volumes:
      - ./datos_db:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d

  # Servicio de Servidor Web + PHP
  web:
    #image: php:8.2-apache
    build: .
    ports:
      - "80:80"
    volumes:
      - ./web:/var/www/html
    depends_on:
      - db

  # Gestor visual php
  phpmyadmin:
    image: phpmyadmin:latest
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: carton123
    depends_on:
      - db
